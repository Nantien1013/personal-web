<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>論文單字庫</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">dev<span>.</span></a>
      <div class="navbar-links" id="navLinks">
        <a href="index.html">首頁</a>
        <a href="resume.html">簡歷</a>
        <a href="collection.html">收藏</a>
        <a href="vocabulary.html" class="active">單字庫</a>
      </div>
      <div class="navbar-actions">
        <button class="theme-toggle" id="themeToggle" title="切換主題">
          <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="navbar-menu-btn" id="menuBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="page-wrapper">
    <div class="container">

      <!-- Header -->
      <div class="page-header">
        <h1 class="page-title">📚 論文單字庫</h1>
        <p class="text-muted text-sm">輸入英文單字自動查詢，搭配間隔複習演算法</p>
        <div class="stats-bar" style="margin-top:var(--space-5);">
          <div class="stat-item">
            <span class="stat-number" id="statTotal">0</span>
            <span class="stat-label">總單字</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-number" id="statWeek">0</span>
            <span class="stat-label">本週新增</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-number" id="statReview">0</span>
            <span class="stat-label">待複習</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-number" id="statFamiliarity">—</span>
            <span class="stat-label">平均熟悉度</span>
          </div>
        </div>
      </div>

      <!-- Mode tabs -->
      <div style="padding: var(--space-5) 0 0;">
        <div class="tabs" id="modeTabs">
          <button class="tab-btn active" data-mode="browse">瀏覽</button>
          <button class="tab-btn" data-mode="add">新增</button>
          <button class="tab-btn" data-mode="review">抽卡複習</button>
        </div>
      </div>

      <!-- ===== BROWSE MODE ===== -->
      <div id="modeBrowse" class="vocab-layout">
        <div class="toolbar">
          <div class="toolbar-left">
            <div class="search-box">
              <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" class="input" id="vocabSearch" placeholder="搜尋單字…">
            </div>
            <select class="select" style="width:130px;" id="vocabFilterFam">
              <option value="">全部熟悉度</option>
              <option value="0">未複習</option>
              <option value="1">1 顆星</option>
              <option value="2">2 顆星</option>
              <option value="3">3 顆星</option>
              <option value="4">4 顆星</option>
              <option value="5">已精熟</option>
            </select>
          </div>
          <div class="toolbar-right">
            <button class="btn btn-ghost btn-sm" id="exportBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              匯出
            </button>
          </div>
        </div>

        <div id="vocabListArea" style="min-height:300px;"></div>
      </div>

      <!-- ===== ADD MODE ===== -->
      <div id="modeAdd" class="vocab-layout" style="display:none;">
        <div class="lookup-card">
          <h3 style="font-size:var(--text-base);font-weight:var(--weight-semibold);margin-bottom:var(--space-4);">查詢單字</h3>
          <div class="input-group">
            <input type="text" class="input" id="lookupInput" placeholder="輸入英文單字，自動查詢…" autocomplete="off" autocapitalize="off" spellcheck="false">
            <button class="btn btn-primary" id="lookupBtn">查詢</button>
          </div>
          <div class="lookup-status" id="lookupStatus"></div>
        </div>

        <div class="card" id="addFormCard">
          <h3 style="font-size:var(--text-base);font-weight:var(--weight-semibold);margin-bottom:var(--space-5);">單字資料</h3>
          <form id="vocabForm">
            <input type="hidden" id="vocabEditId">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);">
              <div class="form-field">
                <label class="form-label">英文單字 *</label>
                <input type="text" class="input" id="vWord" required placeholder="e.g. malicious">
              </div>
              <div class="form-field">
                <label class="form-label">詞性</label>
                <select class="select" id="vPos">
                  <option value="">—</option>
                  <option value="n.">n. 名詞</option>
                  <option value="v.">v. 動詞</option>
                  <option value="adj.">adj. 形容詞</option>
                  <option value="adv.">adv. 副詞</option>
                  <option value="prep.">prep. 介系詞</option>
                  <option value="conj.">conj. 連接詞</option>
                  <option value="phrase">phrase 片語</option>
                </select>
              </div>
            </div>
            <div class="form-field">
              <label class="form-label">中文解釋 *</label>
              <input type="text" class="input" id="vMeaning" required placeholder="e.g. 惡意的；有害的">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);">
              <div class="form-field">
                <label class="form-label">KK 音標</label>
                <input type="text" class="input font-mono" id="vPhonetic" placeholder="e.g. /məˈlɪʃəs/">
              </div>
              <div class="form-field">
                <label class="form-label">發音檔 URL</label>
                <input type="url" class="input" id="vAudioUrl" placeholder="https://...">
              </div>
            </div>
            <div class="form-field">
              <label class="form-label">例句（英文）</label>
              <textarea class="textarea" id="vExample" placeholder="e.g. The malicious software encrypted all files on the server."></textarea>
            </div>
            <div class="form-field">
              <label class="form-label">例句（中文）</label>
              <textarea class="textarea" id="vExampleZh" placeholder="e.g. 該惡意軟體加密了伺服器上的所有檔案。"></textarea>
            </div>
            <div class="form-field">
              <label class="form-label">來源論文</label>
              <input type="text" class="input" id="vSource" placeholder="e.g. Smith et al., 2023">
            </div>
            <div class="form-field">
              <label class="form-label">備註</label>
              <textarea class="textarea" id="vNote" style="min-height:60px;"></textarea>
            </div>
            <div style="display:flex;justify-content:flex-end;gap:var(--space-3);">
              <button type="button" class="btn btn-ghost" id="vocabCancelEdit" style="display:none;">取消編輯</button>
              <button type="submit" class="btn btn-primary" id="vocabSaveBtn">儲存單字</button>
            </div>
          </form>
        </div>
      </div>

      <!-- ===== REVIEW MODE ===== -->
      <div id="modeReview" class="vocab-layout" style="display:none;">
        <div id="reviewEmpty" style="display:none;">
          <div class="empty-state">
            <div class="empty-state-icon">🎉</div>
            <h3 class="empty-state-title">今日複習完成！</h3>
            <p class="empty-state-desc">沒有待複習的單字，明天再來吧。</p>
          </div>
        </div>

        <div id="reviewArea">
          <!-- Progress -->
          <div style="max-width:480px;margin:0 auto var(--space-5);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2);">
              <span class="text-sm text-muted">今日進度</span>
              <span class="text-sm font-mono" id="reviewProgress">0 / 0</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" id="reviewProgressFill" style="width:0%;"></div>
            </div>
          </div>

          <!-- Flashcard -->
          <div class="flashcard-scene" id="flashcardScene">
            <div class="flashcard" id="flashcard">
              <div class="flashcard-face flashcard-front">
                <div class="flashcard-word" id="fcWord">—</div>
                <div class="flashcard-phonetic" id="fcPhonetic"></div>
                <button class="btn btn-ghost btn-sm" id="fcPlayBtn" style="margin-top:var(--space-4);display:none;">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  發音
                </button>
                <p class="text-muted text-sm" style="margin-top:var(--space-6);">點擊卡片翻面</p>
              </div>
              <div class="flashcard-face flashcard-back">
                <div class="flashcard-meaning" id="fcMeaning">—</div>
                <div class="flashcard-phonetic" id="fcPos" style="margin-bottom:var(--space-4);"></div>
                <p class="flashcard-example" id="fcExample"></p>
                <p class="flashcard-example" id="fcExampleZh" style="margin-top:var(--space-2);color:var(--color-text-faint);font-style:normal;"></p>
              </div>
            </div>
          </div>

          <!-- Self-rating buttons -->
          <div class="review-actions" id="reviewActions" style="display:none;">
            <button class="review-btn review-btn-forgot" data-score="0">😵 忘記</button>
            <button class="review-btn review-btn-vague" data-score="1">🤔 有點印象</button>
            <button class="review-btn review-btn-good" data-score="2">😊 記得</button>
            <button class="review-btn review-btn-perfect" data-score="3">🔥 很熟</button>
          </div>
          <div style="text-align:center;margin-top:var(--space-4);" id="flipHint">
            <p class="text-sm text-muted">點擊卡片查看答案</p>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <div class="container">
      <p>Built with ❤️ &nbsp;·&nbsp; Vanilla JS + Node.js + MySQL</p>
    </div>
  </footer>

  <!-- Edit Modal for vocab -->
  <div class="modal-backdrop" id="vocabDetailModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="vocabDetailTitle">單字詳情</h2>
        <button class="modal-close" id="vocabDetailClose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="vocabDetailBody"></div>
      <div class="modal-footer">
        <button class="btn btn-danger btn-sm" id="vocabDetailDelete" style="margin-right:auto;">刪除</button>
        <button class="btn btn-ghost" id="vocabDetailCancel">關閉</button>
        <button class="btn btn-primary" id="vocabDetailEdit">編輯</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/vocabulary.js"></script>
  <script>
    const html = document.documentElement;
    html.dataset.theme = localStorage.getItem('theme') || 'dark';
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    function updateThemeIcon(t) {
      themeIcon.innerHTML = t === 'dark'
        ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
        : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    }
    updateThemeIcon(html.dataset.theme);
    themeToggle.addEventListener('click', () => {
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      html.dataset.theme = next;
      localStorage.setItem('theme', next);
      updateThemeIcon(next);
    });
    document.getElementById('menuBtn').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });
  </script>
</body>
</html>
